services:
  - type: web
    name: santhosh-chatbot-rag
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false
      - key: BEDROCK_CHAT_MODEL
        value: us.anthropic.claude-sonnet-4-5-20250929-v1:0
      - key: BEDROCK_EMBEDDING_MODEL
        value: amazon.titan-embed-text-v2:0
      - key: BEDROCK_EMBEDDING_INPUT_TYPE
        value: TEXT
      - key: APP_ADMIN_TOKEN
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
